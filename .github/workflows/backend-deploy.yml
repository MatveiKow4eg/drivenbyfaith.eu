name: Backend Deploy to Vultr

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/backend-deploy.yml

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USER }}
          key: ${{ secrets.VULTR_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            export APP_DIR=${{ secrets.VULTR_APP_DIR }}
            export BRANCH=main
            chmod +x $APP_DIR/backend/scripts/deploy-vultr.sh
            $APP_DIR/backend/scripts/deploy-vultr.sh
